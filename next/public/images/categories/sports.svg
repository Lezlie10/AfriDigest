  <path d="M90 500 C240 430 360 500 500 440 C640 380 760 430 900 360 C980 320 1040 300 1110 270" stroke="#fff7ed" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M90 560 C240 500 360 560 500 510 C640 460 760 500 900 450 C980 420 1040 400 1110 370" stroke="#fff7ed" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
