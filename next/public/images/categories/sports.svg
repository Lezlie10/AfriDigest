  <desc id="desc">Dynamic editorial artwork representing speed, play, and competition.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
