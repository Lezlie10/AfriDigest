<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">General desk artwork</title>
  <desc id="desc">Neutral editorial artwork used as default article image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <circle cx="210" cy="140" r="180" fill="#c49b35" fill-opacity="0.25"/>
  <circle cx="1020" cy="600" r="260" fill="#1e3a8a" fill-opacity="0.35"/>
  <path d="M120 460 L1080 460" stroke="#e5e7eb" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M120 510 L1080 510" stroke="#e5e7eb" stroke-opacity="0.3" stroke-width="2"/>
  <path d="M120 560 L1080 560" stroke="#e5e7eb" stroke-opacity="0.2" stroke-width="2"/>
  <text x="90" y="130" font-family="Georgia, serif" font-size="84" fill="#f8fafc">AFRIDIGEST</text>
  <text x="90" y="178" font-family="Arial, sans-serif" font-size="24" letter-spacing="3" fill="#e5e7eb">EDITORIAL FEATURE</text>
</svg>
