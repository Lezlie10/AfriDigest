<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Opinion desk artwork</title>
  <desc id="desc">Editorial artwork with layered columns representing argument and perspective.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="120" y="180" width="120" height="380" fill="#f3f4f6" fill-opacity="0.18"/>
  <rect x="280" y="160" width="120" height="400" fill="#f3f4f6" fill-opacity="0.25"/>
  <rect x="440" y="140" width="120" height="420" fill="#f3f4f6" fill-opacity="0.32"/>
  <rect x="600" y="180" width="120" height="380" fill="#f3f4f6" fill-opacity="0.24"/>
  <rect x="760" y="220" width="120" height="340" fill="#f3f4f6" fill-opacity="0.18"/>
  <path d="M900 520 L1090 520" stroke="#c49b35" stroke-width="8"/>
  <path d="M900 470 L1090 470" stroke="#c49b35" stroke-width="8" stroke-opacity="0.6"/>
  <text x="90" y="120" font-family="Georgia, serif" font-size="88" fill="#f9fafb">OPINION</text>
  <text x="90" y="172" font-family="Arial, sans-serif" font-size="24" letter-spacing="3" fill="#d1d5db">AFRIDIGEST DESK</text>
</svg>
