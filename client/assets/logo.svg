<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="64" viewBox="0 0 240 64" role="img" aria-label="AfriDigest logo">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#C49B35"/>
      <stop offset="100%" stop-color="#8E4A2F"/>
    </linearGradient>
  </defs>
  <rect width="240" height="64" fill="none"/>
  <!-- decorative stripe inspired by kente patterns -->
  <g transform="translate(8,8)">
    <rect width="48" height="48" rx="8" fill="#111"/>
    <rect x="6" y="6" width="36" height="36" rx="6" fill="url(#g1)"/>
    <path d="M10 38 L38 10" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- logotype -->
  <g transform="translate(72,40)" fill="#0b0b0b" font-family="Merriweather, serif" font-weight="700">
    <text x="0" y="-6" font-size="22">AfriDigest</text>
    <text x="0" y="12" font-size="10" fill="#8E4A2F">All Things Africa</text>
  </g>
</svg>
